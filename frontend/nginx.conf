server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://api:8010/api/;
  }

  location /protected-assets/ {
    internal;
    alias /data/geomimo/;
  }

  # Redirect bare /stac → /stac/ so the trailing-slash proxy works cleanly
  location = /stac {
    return 301 /stac/;
  }

  location /stac/ {
    proxy_pass http://stac-api:8080/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
